version: "3.8"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: abanos
      POSTGRES_PASSWORD: abanos
      POSTGRES_DB: abanos
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://abanos:abanos@db:5432/abanos
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: ["npm", "run", "dev"]
    depends_on:
      - backend

volumes:
  db_data:
